<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Cars – Eutopia Motors</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .filter-mobile-toggle { display:none; background:var(--primary); color:#fff; border:none; padding:10px 18px; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; margin-bottom:16px; }
    @media(max-width:900px){ .filter-mobile-toggle{display:block;} .filter-panel{display:none;} .filter-panel.open{display:block;} }
    .car-list-item { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); display:grid; grid-template-columns:260px 1fr; overflow:hidden; transition:var(--transition); cursor:pointer; }
    .car-list-item:hover { transform:translateY(-3px); box-shadow:var(--shadow-hover); }
    .car-list-img { height:180px; overflow:hidden; }
    .car-list-img img { width:100%; height:100%; object-fit:cover; }
    .car-list-body { padding:20px; display:flex; flex-direction:column; justify-content:space-between; }
    .car-list-title { font-size:1.1rem; font-weight:800; color:var(--primary); }
    .car-list-price { font-size:1.5rem; font-weight:800; color:var(--accent); }
    .active-filters { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
    .filter-chip { background:var(--light); border:1.5px solid var(--border); border-radius:20px; padding:4px 12px; font-size:0.78rem; display:flex; align-items:center; gap:6px; }
    .filter-chip button { background:none; border:none; cursor:pointer; font-size:13px; color:var(--text-muted); }
    @media(max-width:600px){ .car-list-item{grid-template-columns:1fr;} .car-list-img{height:200px;} }
  </style>
</head>
<body class="has-fab">

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><div class="logo-icon">E</div><div class="logo-text">Eutopia <span>Motors</span></div></a>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="inventory.html" class="active">Buy a Car</a>
      <a href="sell.html">Sell Your Car</a>
      <a href="inventory.html?filter=bakkie">Bakkies</a>
      <a href="inventory.html?filter=suv">SUVs</a>
      <a href="about.html">About Us</a>
      <a href="admin.html" class="nav-cta">Admin</a>
    </div>
    <div class="nav-phone">📞 0800 EUTOPIA</div>
    <div class="nav-toggle" id="navToggle"><span></span><span></span><span></span></div>
  </div>
</nav>
<div class="nav-overlay" id="navOverlay"></div>

<div class="breadcrumb"><div class="container"><div class="breadcrumb-inner"><a href="index.html">Home</a><span>›</span><span>Buy a Car</span></div></div></div>

<div class="container">
  <div class="inventory-layout">

    <!-- FILTER PANEL -->
    <div>
      <button class="filter-mobile-toggle" id="filterToggle">⚙️ Filters</button>
      <div class="filter-overlay" id="filterOverlay"></div>
      <div class="filter-panel" id="filterPanel">
        <h3>Filters <button class="filter-reset" onclick="resetFilters()" style="font-size:0.75rem;padding:4px 10px">Clear All</button><button class="filter-drawer-close" id="filterClose" title="Close filters">✕</button></h3>

        <div class="filter-group">
          <label>Search</label>
          <input type="text" id="fSearch" placeholder="Make, model, keyword…" oninput="applyFilters()">
        </div>
        <div class="filter-group">
          <label>Make</label>
          <select id="fMake" onchange="applyFilters()"><option value="">All Makes</option></select>
        </div>
        <div class="filter-group">
          <label>Body Type</label>
          <select id="fBody" onchange="applyFilters()">
            <option value="">All Types</option>
            <option>Sedan</option><option>Hatchback</option><option>SUV</option>
            <option>Bakkie</option><option>Coupe</option><option>MPV</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Gearbox</label>
          <select id="fTrans" onchange="applyFilters()">
            <option value="">Any</option><option>Automatic</option><option>Manual</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Condition</label>
          <select id="fCondition" onchange="applyFilters()">
            <option value="">Any</option><option value="new">New</option>
            <option value="used">Used</option><option value="demo">Demo</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Branch / Dealer</label>
          <select id="fDealer" onchange="applyFilters()"><option value="">All Branches</option></select>
        </div>
        <div class="filter-group">
          <label>Fuel Type</label>
          <select id="fFuel" onchange="applyFilters()">
            <option value="">Any</option><option>Petrol</option><option>Diesel</option><option>Hybrid</option><option>Electric</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Province</label>
          <select id="fProvince" onchange="applyFilters()">
            <option value="">All Provinces</option>
            <option>Gauteng</option><option>Western Cape</option><option>KwaZulu-Natal</option>
            <option>Eastern Cape</option><option>Limpopo</option><option>North West</option>
            <option>Mpumalanga</option><option>Free State</option><option>Northern Cape</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Price Range</label>
          <div class="price-range">
            <input type="number" id="fMinPrice" placeholder="Min" oninput="applyFilters()">
            <span>–</span>
            <input type="number" id="fMaxPrice" placeholder="Max" oninput="applyFilters()">
          </div>
        </div>
        <div class="filter-group">
          <label>Max Mileage (km)</label>
          <select id="fMileage" onchange="applyFilters()">
            <option value="">Any</option>
            <option value="20000">Under 20 000</option>
            <option value="50000">Under 50 000</option>
            <option value="80000">Under 80 000</option>
            <option value="120000">Under 120 000</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Year From</label>
          <select id="fYear" onchange="applyFilters()"><option value="">Any Year</option></select>
        </div>
        <button class="btn btn-primary btn-full" onclick="applyFilters()">Apply Filters</button>
      </div>
    </div>

    <!-- RESULTS -->
    <div>
      <div id="activeFilters" class="active-filters"></div>
      <div class="inv-header">
        <div class="inv-count"><strong id="resultCount">0</strong> vehicles found</div>
        <div class="inv-sort">
          <select id="sortBy" onchange="applyFilters()">
            <option value="newest">Newest First</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="mileage">Lowest Mileage</option>
            <option value="year">Newest Year</option>
          </select>
          <div class="view-toggle">
            <button id="btnGrid" class="active" onclick="setView('grid')" title="Grid view">⊞</button>
            <button id="btnList" onclick="setView('list')" title="List view">☰</button>
          </div>
        </div>
      </div>
      <div id="carsContainer" class="cars-grid"></div>
      <div id="pagination" class="pagination"></div>
    </div>

  </div>
</div>

<footer style="background:var(--primary);color:rgba(255,255,255,0.6);padding:30px 0;text-align:center;font-size:0.85rem">
  <div>© 2025 Eutopia Motors (Pty) Ltd &nbsp;|&nbsp; <a href="index.html" style="color:var(--gold)">Back to Home</a></div>
</footer>

<!-- FLOATING ACTION BAR -->
<div class="fab-bar">
  <a href="tel:0800388674" class="fab-btn fab-call">📞 Call Us</a>
  <a href="https://wa.me/27800387682" class="fab-btn fab-whatsapp" target="_blank" rel="noopener">💬 WhatsApp</a>
</div>
<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">↑</button>

<div class="toast-container" id="toastContainer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/data.js"></script>
<script>
  // Nav
  (function(){
    const toggle = document.getElementById('navToggle');
    const links  = document.getElementById('navLinks');
    const overlay = document.getElementById('navOverlay');
    function openNav()  { links.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow='hidden'; }
    function closeNav() { links.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow=''; }
    toggle.addEventListener('click', () => links.classList.contains('open') ? closeNav() : openNav());
    overlay.addEventListener('click', closeNav);
    links.querySelectorAll('a').forEach(a => a.addEventListener('click', closeNav));
  })();
  // Filter drawer
  (function(){
    const panel   = document.getElementById('filterPanel');
    const fOverlay= document.getElementById('filterOverlay');
    const btn     = document.getElementById('filterToggle');
    const close   = document.getElementById('filterClose');
    function openFilter()  { panel.classList.add('open'); fOverlay.classList.add('open'); document.body.style.overflow='hidden'; }
    function closeFilter() { panel.classList.remove('open'); fOverlay.classList.remove('open'); document.body.style.overflow=''; }
    btn.addEventListener('click', openFilter);
    fOverlay.addEventListener('click', closeFilter);
    if (close) close.addEventListener('click', closeFilter);
  })();
  // Back to top
  window.addEventListener('scroll', () => document.getElementById('backTop').classList.toggle('show', window.scrollY > 400));
</script>
<script>
  let currentView = 'grid';
  let currentPage = 1;
  const PER_PAGE = 9;
  let _allCars = [];

  const params = new URLSearchParams(location.search);
  if (params.get('body') || params.get('filter') === 'suv') document.getElementById('fBody').value = params.get('body') || 'SUV';
  if (params.get('filter') === 'bakkie') document.getElementById('fBody').value = 'Bakkie';
  if (params.get('maxPrice')) document.getElementById('fMaxPrice').value = params.get('maxPrice');
  if (params.get('q')) document.getElementById('fSearch').value = params.get('q');

  function getFiltered() {
    let cars = _allCars;
    const q = document.getElementById('fSearch').value.toLowerCase();
    const make = document.getElementById('fMake').value;
    const body = document.getElementById('fBody').value;
    const trans = document.getElementById('fTrans').value;
    const fuel = document.getElementById('fFuel').value;
    const province = document.getElementById('fProvince').value;
    const condition = document.getElementById('fCondition').value;
    const dealer = document.getElementById('fDealer').value;
    const minP = parseFloat(document.getElementById('fMinPrice').value) || 0;
    const maxP = parseFloat(document.getElementById('fMaxPrice').value) || Infinity;
    const maxMile = parseFloat(document.getElementById('fMileage').value) || Infinity;
    const yearFrom = parseInt(document.getElementById('fYear').value) || 0;
    const sort = document.getElementById('sortBy').value;
    cars = cars.filter(c => {
      if (q && !`${c.make} ${c.model} ${c.year} ${c.color} ${c.body}`.toLowerCase().includes(q)) return false;
      if (make && c.make !== make) return false;
      if (body && c.body !== body) return false;
      if (trans && c.transmission !== trans) return false;
      if (fuel && c.fuel !== fuel) return false;
      if (province && c.province !== province) return false;
      if (condition && c.condition !== condition) return false;
      if (dealer && (c.dealer || 'Eutopia Motors') !== dealer) return false;
      if (c.price < minP || c.price > maxP) return false;
      if (c.mileage > maxMile) return false;
      if (c.year < yearFrom) return false;
      return true;
    });
    if (sort === 'price-asc') cars.sort((a,b) => a.price - b.price);
    else if (sort === 'price-desc') cars.sort((a,b) => b.price - a.price);
    else if (sort === 'mileage') cars.sort((a,b) => a.mileage - b.mileage);
    else if (sort === 'year') cars.sort((a,b) => b.year - a.year);
    else cars.sort((a,b) => new Date(b.date_added||b.dateAdded||0) - new Date(a.date_added||a.dateAdded||0));
    return cars;
  }

  function applyFilters() { currentPage = 1; render(); }

  function render() {
    const all = getFiltered();
    const totalPages = Math.ceil(all.length / PER_PAGE);
    const paged = all.slice((currentPage - 1) * PER_PAGE, currentPage * PER_PAGE);
    document.getElementById('resultCount').textContent = all.length;
    const container = document.getElementById('carsContainer');
    if (paged.length === 0) {
      container.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🚗</div><h3>No vehicles match your search</h3><p>Try adjusting your filters</p><button class="btn btn-primary" onclick="resetFilters()" style="margin-top:16px">Clear Filters</button></div>';
      container.className = '';
    } else if (currentView === 'grid') {
      container.className = 'cars-grid';
      container.innerHTML = paged.map(c => buildCarCard(c)).join('');
    } else {
      container.className = '';
      container.style.display = 'flex';
      container.style.flexDirection = 'column';
      container.style.gap = '16px';
      container.innerHTML = paged.map(c => `
        <div class="car-list-item" onclick="window.location='car-detail.html?id=${c.id}'">
          <div class="car-list-img"><img src="${c.image}" alt="${getCarTitle(c)}" onerror="this.src='https://placehold.co/260x180/0A1628/fff?text=No+Image'"></div>
          <div class="car-list-body">
            <div>
              <div class="car-list-title">${getCarTitle(c)}</div>
              <div style="color:var(--text-muted);font-size:0.85rem;margin:4px 0">${c.color} · ${c.province} · ${c.body}</div>
              <div class="car-card-specs" style="margin:10px 0">
                <span class="spec-tag">🛣️ ${formatMileage(c.mileage)}</span>
                <span class="spec-tag">⚙️ ${c.transmission}</span>
                <span class="spec-tag">⛽ ${c.fuel}</span>
              </div>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div class="car-list-price">${formatPrice(c.price)}</div>
              <a class="btn btn-primary btn-sm" href="car-detail.html?id=${c.id}" onclick="event.stopPropagation()">View Details</a>
            </div>
          </div>
        </div>`).join('');
    }
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }
    let html = '';
    if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">‹</button>`;
    for (let i = 1; i <= totalPages; i++) html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    if (currentPage < totalPages) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">›</button>`;
    pg.innerHTML = html;
  }

  function goPage(p) { currentPage = p; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  function setView(v) {
    currentView = v;
    document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
    document.getElementById('btnList').classList.toggle('active', v === 'list');
    render();
  }
  function resetFilters() {
    ['fSearch','fMake','fBody','fTrans','fFuel','fProvince','fCondition','fDealer','fMinPrice','fMaxPrice','fMileage','fYear'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
    applyFilters();
  }

  (async () => {
    document.getElementById('carsContainer').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-muted)">Loading vehicles…</div>';
    _allCars = await DB.getCars();
    const makes = [...new Set(_allCars.map(c => c.make))].sort();
    const fMake = document.getElementById('fMake');
    makes.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; fMake.appendChild(o); });
    if (params.get('make')) fMake.value = params.get('make');
    const years = [...new Set(_allCars.map(c => c.year))].sort((a,b)=>b-a);
    const fYear = document.getElementById('fYear');
    years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; fYear.appendChild(o); });
    const dealers = [...new Set(_allCars.map(c => c.dealer || 'Eutopia Motors'))].sort();
    const fDealer = document.getElementById('fDealer');
    dealers.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; fDealer.appendChild(o); });
    render();
  })();
</script>
</body>
